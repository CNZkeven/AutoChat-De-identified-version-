<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="http://localhost:8000">
    <title>探究型智能体</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <nav class="navbar">
        <div class="container">
            <div class="logo">智能体系统</div>
            <div class="nav-links">
                <a href="index.html">主页</a>
                <span id="nav-user" class="nav-item"></span>
                <a href="admin.html" id="nav-admin">管理员</a>
                <a href="login.html" id="nav-login">登录</a>
                <a href="register.html" id="nav-register">注册</a>
                <a href="#" id="nav-logout">登出</a>
            </div>
        </div>
    </nav>

    <section class="chat-section">
        <div class="container chat-wrapper">
            <h1>探究型智能体</h1>
            <div class="chat-panel">
                <div class="chat-layout">
                    <aside class="conversation-panel">
                        <div class="conversation-header">
                            <div class="conversation-title">会话列表</div>
                            <button class="btn ghost" id="new-conv-btn">新建</button>
                        </div>
                        <div class="conversation-list" id="conversation-list"></div>
                        <div class="conversation-status" id="conversation-status"></div>
                    </aside>
                    <div class="chat-main">
                        <div class="select-toolbar">
                            <label class="select-toggle">
                                <input type="checkbox" id="select-mode-toggle">
                                <span>勾选模式</span>
                            </label>
                            <button class="btn ghost" id="use-selected-btn" disabled>用勾选生成提示</button>
                        </div>
                        <div class="chat-container" id="chat-container"></div>
                        <div class="chat-input">
                            <input type="text" id="message-input" placeholder="输入你的消息">
                            <button id="send-button" class="btn">发送</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2025 智能体系统. 保留所有权利</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat-common.js"></script>
    <script src="js/exploration.js"></script>
</body>
</html>
