<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="http://localhost:8000">
    <title>注册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="container">
            <div class="logo">智能体系统</div>
            <div class="nav-links">
                <a href="index.html">主页</a>
                <span id="nav-user" class="nav-item"></span>
                <a href="login.html" id="nav-login">登录</a>
                <a href="register.html" id="nav-register">注册</a>
                <a href="#" id="nav-logout">登出</a>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h1>注册</h1>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <input class="form-input" id="register-username" name="username" type="text" required>
                </div>
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input class="form-input" id="register-password" name="password" type="password" required>
                </div>
                <div class="form-group">
                    <label for="register-confirm">确认密码</label>
                    <input class="form-input" id="register-confirm" name="confirm" type="password" required>
                </div>
                <button type="submit" class="btn">注册</button>
                <div class="form-error" id="form-error"></div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2025 智能体系统. 保留所有权利</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
