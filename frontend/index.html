<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="http://localhost:8000">
    <title>智能体系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#357ABD',
                        ideological: '#ff6b6b',
                        evaluation: '#48dbfb',
                        task: '#1dd1a1',
                        exploration: '#feca57',
                        competition: '#5f27cd',
                        course: '#ff9ff3',
                    },
                    fontFamily: {
                        sans: ['PingFang SC', 'Source Han Sans', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-flip {
                transform-style: preserve-3d;
                transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .card-flip-active {
                transform: rotateY(180deg);
            }
            .card-front, .card-back {
                backface-visibility: hidden;
                -webkit-backface-visibility: hidden;
            }
            .card-back {
                transform: rotateY(180deg);
            }
        }
    </style>
</head>
<body class="font-sans" style="background-image: url('images/037b46756f83c2f61e04e7368e2feb12.jpg'); background-size: cover; background-attachment: fixed;">
    <!-- 导航栏 -->
    <nav class="bg-gradient-to-r from-primary to-secondary text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="text-2xl font-bold mb-4 md:mb-0">智能体系统</div>
                <div class="flex flex-wrap justify-center gap-4">
                    <a href="ideological.html" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">思政型智能体</a>
                    <a href="evaluation.html" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">评价型智能体</a>
                    <a href="task.html" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">任务型智能体</a>
                    <a href="exploration.html" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">探究型智能体</a>
                    <a href="competition.html" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">竞赛型智能体</a>
                    <a href="course.html" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">课程型智能体</a>
                    <span id="nav-user" class="px-2 py-1 rounded"></span>
                    <a href="login.html" id="nav-login" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">登录</a>
                    <a href="register.html" id="nav-register" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">注册</a>
                    <a href="#" id="nav-logout" class="hover:text-yellow-200 transition-colors px-2 py-1 rounded">登出</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-12">
        <h1 class="text-3xl font-bold text-center mb-12 text-gray-800">智能体导航</h1>
        
        <!-- 智能体卡片网格 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 思政型智能体 -->
            <div class="card-container perspective-1000 h-64 cursor-pointer" data-agent="ideological">
                <div class="card-flip relative w-full h-full rounded-xl shadow-lg">
                    <!-- 卡片正面 -->
                    <div class="card-front absolute inset-0 flex flex-col">
                        <div class="bg-ideological text-white p-3 text-center font-bold">思政型智能体</div>
<div class="flex-1 bg-cover bg-center" style="background-image: url('images/4e95f6fa4fbda42e8482ba06506284ce_0.jpg');"></div>
                    </div>
                    <!-- 卡片背面 -->
                    <div class="card-back absolute inset-0 bg-ideological text-white p-5 flex flex-col justify-center items-center text-center">
                        <p class="mb-4">提供思想政治教育相关内容和指导</p>
                        <button class="bg-white text-ideological px-4 py-2 rounded-full hover:bg-gray-100 transition-colors">开始对话</button>
                    </div>
                </div>
            </div>

            <!-- 评价型智能体 -->
            <div class="card-container perspective-1000 h-64 cursor-pointer" data-agent="evaluation">
                <div class="card-flip relative w-full h-full rounded-xl shadow-lg">
                    <div class="card-front absolute inset-0 flex flex-col">
                        <div class="bg-evaluation text-white p-3 text-center font-bold">评价型智能体</div>
<div class="flex-1 bg-cover bg-center" style="background-image: url('images/3abee1adc3279109c8ede1004eba52c8_0.jpg');"></div>
                    </div>
                    <div class="card-back absolute inset-0 bg-evaluation text-white p-5 flex flex-col justify-center items-center text-center">
                        <p class="mb-4">对内容进行客观评价和反馈</p>
                        <button class="bg-white text-evaluation px-4 py-2 rounded-full hover:bg-gray-100 transition-colors">开始对话</button>
                    </div>
                </div>
            </div>

            <!-- 任务型智能体 -->
            <div class="card-container perspective-1000 h-64 cursor-pointer" data-agent="task">
                <div class="card-flip relative w-full h-full rounded-xl shadow-lg">
                    <div class="card-front absolute inset-0 flex flex-col">
                        <div class="bg-task text-white p-3 text-center font-bold">任务型智能体</div>
<div class="flex-1 bg-cover bg-center" style="background-image: url('images/dff83e09cf9a55b16ba337ed1c51e1a8_0.jpg');"></div>
                    </div>
                    <div class="card-back absolute inset-0 bg-task text-white p-5 flex flex-col justify-center items-center text-center">
                        <p class="mb-4">协助完成各类任务和项目管理</p>
                        <button class="bg-white text-task px-4 py-2 rounded-full hover:bg-gray-100 transition-colors">开始对话</button>
                    </div>
                </div>
            </div>

            <!-- 探究型智能体 -->
            <div class="card-container perspective-1000 h-64 cursor-pointer" data-agent="exploration">
                <div class="card-flip relative w-full h-full rounded-xl shadow-lg">
                    <div class="card-front absolute inset-0 flex flex-col">
                        <div class="bg-exploration text-white p-3 text-center font-bold">探究型智能体</div>
<div class="flex-1 bg-cover bg-center" style="background-image: url('images/1f70d339b0b9eda3f95387bc102b4644_0.jpg');"></div>
                    </div>
                    <div class="card-back absolute inset-0 bg-exploration text-white p-5 flex flex-col justify-center items-center text-center">
                        <p class="mb-4">辅助进行深度探索和研究</p>
                        <button class="bg-white text-exploration px-4 py-2 rounded-full hover:bg-gray-100 transition-colors">开始对话</button>
                    </div>
                </div>
            </div>

            <!-- 竞赛型智能体 -->
            <div class="card-container perspective-1000 h-64 cursor-pointer" data-agent="competition">
                <div class="card-flip relative w-full h-full rounded-xl shadow-lg">
                    <div class="card-front absolute inset-0 flex flex-col">
                        <div class="bg-competition text-white p-3 text-center font-bold">竞赛型智能体</div>
<div class="flex-1 bg-cover bg-center" style="background-image: url('images/eaacf4c0a0bdadbdb1cadbf40773ce48.jpg');"></div>
                    </div>
                    <div class="card-back absolute inset-0 bg-competition text-white p-5 flex flex-col justify-center items-center text-center">
                        <p class="mb-4">提供竞赛指导和策略建议</p>
                        <button class="bg-white text-competition px-4 py-2 rounded-full hover:bg-gray-100 transition-colors">开始对话</button>
                    </div>
                </div>
            </div>

            <!-- 课程型智能体 -->
            <div class="card-container perspective-1000 h-64 cursor-pointer" data-agent="course">
                <div class="card-flip relative w-full h-full rounded-xl shadow-lg">
                    <div class="card-front absolute inset-0 flex flex-col">
                        <div class="bg-course text-white p-3 text-center font-bold">课程型智能体</div>
<div class="flex-1 bg-cover bg-center" style="background-image: url('images/a43168df1330ad63a3cb3f63563bb2d8_720.jpg');"></div>
                    </div>
                    <div class="card-back absolute inset-0 bg-course text-white p-5 flex flex-col justify-center items-center text-center">
                        <p class="mb-4">提供课程学习辅导和答疑</p>
                        <button class="bg-white text-course px-4 py-2 rounded-full hover:bg-gray-100 transition-colors">开始对话</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 卡片翻转效果
        document.querySelectorAll('.card-container').forEach(container => {
            const card = container.querySelector('.card-flip');
            
            container.addEventListener('mouseenter', () => {
                card.classList.toggle('card-flip-active');
            });
            
            container.addEventListener('mouseleave', () => {
                card.classList.add('card-flip-active');
            });
            
            container.addEventListener('mouseleave', () => {
                if (!container.classList.contains('clicked')) {
                    card.classList.remove('card-flip-active');
                }
            });
            
            // 点击卡片跳转到相应的聊天页面
            container.addEventListener('click', () => {
                const agentType = container.getAttribute('data-agent');
                window.location.href = `${agentType}.html`;
            });
        });
    </script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Auth) {
                window.Auth.initNav();
            }
        });
    </script>
</body>
</html>
