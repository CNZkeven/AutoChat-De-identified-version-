<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="http://localhost:8000">
    <title>管理员调试台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
    <nav class="navbar">
        <div class="container">
            <div class="logo">智能体系统 · 管理员调试</div>
            <div class="nav-links">
                <a href="index.html">主页</a>
                <span id="nav-user" class="nav-item"></span>
                <a href="admin.html" id="nav-admin">管理员</a>
                <a href="login.html" id="nav-login">登录</a>
                <a href="register.html" id="nav-register">注册</a>
                <a href="#" id="nav-logout">登出</a>
            </div>
        </div>
    </nav>

    <main class="admin-main">
        <div class="container admin-container">
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="users">用户管理</button>
                <button class="admin-tab" data-tab="agents">智能体管理</button>
            </div>

            <section id="admin-users" class="admin-tab-panel active">
                <div class="admin-panel">
                    <div class="admin-panel-header">
                        <h2>用户管理</h2>
                        <span class="admin-tag">占位</span>
                    </div>
                    <p class="admin-muted">用户管理页面建设中，将用于账户状态、权限与批量操作。</p>
                </div>
            </section>

            <section id="admin-agents" class="admin-tab-panel">
                <div class="admin-grid">
                    <aside class="admin-sidebar">
                        <div class="admin-panel">
                            <div class="admin-panel-header">
                                <h3>测试用户</h3>
                                <span class="admin-tag">默认 demo</span>
                            </div>
                            <label class="admin-label">搜索用户名</label>
                            <input type="text" id="user-search" class="admin-input" placeholder="输入用户名筛选">
                            <label class="admin-label">选择用户</label>
                            <select id="user-select" class="admin-select"></select>
                            <div id="user-meta" class="admin-meta"></div>
                        </div>
                        <div class="admin-panel">
                            <div class="admin-panel-header">
                                <h3>智能体与风格</h3>
                            </div>
                            <label class="admin-label">智能体</label>
                            <select id="agent-select" class="admin-select"></select>
                            <label class="admin-label">风格</label>
                            <select id="style-select" class="admin-select"></select>
                            <div id="prompt-location" class="admin-meta"></div>
                            <pre id="agent-prompt" class="admin-code">提示词加载中...</pre>
                        </div>
                        <div class="admin-panel">
                            <div class="admin-panel-header">
                                <h3>个人设置/能力分析</h3>
                                <span class="admin-tag muted">扩展</span>
                            </div>
                            <pre id="user-profile" class="admin-code">暂无数据</pre>
                        </div>
                    </aside>

                    <section class="admin-column">
                        <div class="admin-panel">
                            <div class="admin-panel-header">
                                <h3>对话列表</h3>
                            </div>
                            <div id="conversation-list" class="admin-list"></div>
                            <div id="conversation-status" class="admin-muted"></div>
                        </div>
                        <div class="admin-panel">
                            <div class="admin-panel-header">
                                <h3>响应过程（用户指令）</h3>
                            </div>
                            <div id="run-list" class="admin-list"></div>
                            <div id="run-status" class="admin-muted"></div>
                        </div>
                    </section>

                    <section class="admin-detail">
                        <div class="admin-panel">
                            <div class="admin-panel-header">
                                <h3>完整指令与响应</h3>
                            </div>
                            <div id="trace-header" class="admin-meta"></div>
                            <div id="trace-list" class="admin-trace"></div>
                        </div>
                        <div class="admin-panel">
                            <div class="admin-panel-header">
                                <h3>调试输入</h3>
                            </div>
                            <textarea id="debug-input" class="admin-textarea" rows="4" placeholder="输入测试指令"></textarea>
                            <div class="admin-actions">
                                <button id="debug-send" class="btn">发送调试</button>
                                <span id="debug-status" class="admin-muted"></span>
                            </div>
                        </div>
                    </section>
                </div>
            </section>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
